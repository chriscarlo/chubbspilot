<!DOCTYPE html>
<html>
<head>
    <title>Concierge Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        #terminal-container {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px;
        }
        
        #terminal-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #2d2d2d;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        
        .header-title {
            color: #cccccc;
            font-size: 14px;
            font-weight: 500;
        }
        
        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }
        
        .header-button {
            background: none;
            border: 1px solid #3e3e3e;
            color: #cccccc;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .header-button:hover {
            background: #3e3e3e;
        }
        
        #connection-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e06c75;
            margin-right: 5px;
        }
        
        #connection-status.connected {
            background: #98c379;
        }
    </style>
</head>
<body>
    <div id="terminal-header">
        <div class="header-title">
            <span id="connection-status"></span>
            Concierge Terminal
        </div>
        <div class="header-actions">
            <button class="header-button" onclick="terminal.clear()">Clear</button>
            <button class="header-button" onclick="terminal.reset()">Reset</button>
            <button class="header-button" onclick="terminal.fit()">Fit</button>
        </div>
    </div>
    <div id="terminal-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.js"></script>
    
    <script>
        // Create terminal using globals from CDN
        const term = new Terminal({
            fontFamily: '"Fira Code", "Consolas", "Monaco", monospace',
            fontSize: 14,
            theme: {
                background: '#1e1e1e',
                foreground: '#cccccc',
                cursor: '#ffffff',
                selection: '#3e4451'
            },
            cursorBlink: true,
            cursorStyle: 'block',
            scrollback: 10000
        });
        
        // Add fit addon
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        
        // Open terminal in container
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();
        
        // Create WebSocket connection
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/api/v1/terminal/ws?session_id=terminal-main-session`;
        let ws = null;
        let connected = false;
        
        function connect() {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                connected = true;
                document.getElementById('connection-status').classList.add('connected');
                term.write('\r\n\x1b[32mConnected to Concierge Terminal\x1b[0m\r\n');
                
                // Send init message to create PTY session
                ws.send(JSON.stringify({
                    type: 'init',
                    session_id: 'terminal-main-session',
                    rows: term.rows,
                    cols: term.cols
                }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        term.write(data.data);
                    } else if (data.type === 'error' && (data.message || data.error)) {
                        term.write(`\r\n\x1b[31mError: ${data.message || data.error}\x1b[0m\r\n`);
                    }
                    // Log other message types for debugging
                    console.log('Received:', data);
                } catch (e) {
                    // If not JSON, treat as raw data
                    term.write(event.data);
                }
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                connected = false;
                document.getElementById('connection-status').classList.remove('connected');
                term.write('\r\n\x1b[31mDisconnected from server\x1b[0m\r\n');
                // Attempt to reconnect after 3 seconds
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        // Send data from terminal to server
        term.onData((data) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'input',
                    data: data
                }));
            }
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            fitAddon.fit();
            // Send resize message if connected
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'resize',
                    rows: term.rows,
                    cols: term.cols
                }));
            }
        });
        
        // Expose terminal functions for buttons
        window.terminal = {
            clear: () => term.clear(),
            reset: () => term.reset(),
            fit: () => fitAddon.fit()
        };
        
        // Start connection
        connect();
        term.focus();
    </script>
</body>
</html>

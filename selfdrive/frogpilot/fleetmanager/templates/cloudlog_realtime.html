{% extends "layout.html" %}

{% block title %}
    CloudLog Stream
{% endblock %}

{% block main %}
    <br>
    <h1>CloudLog Stream</h1>
    <br>

    <div class="controls-container">
        <button type="button" id="clearLogsButton" class="btn btn-warning">
            Clear Display
        </button>
        <label class="toggle-container">
            <input type="checkbox" id="autoScrollToggle" checked>
            <span class="toggle-label">Auto-scroll</span>
        </label>

        <div class="filter-container">
            <span class="filter-label">Filter by level:</span>
            <label class="filter-option">
                <input type="checkbox" class="level-filter" data-level="INFO" checked>
                <span>INFO</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="level-filter" data-level="WARNING" checked>
                <span>WARNING</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="level-filter" data-level="ERROR" checked>
                <span>ERROR</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="level-filter" data-level="CRITICAL" checked>
                <span>CRITICAL</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="level-filter" data-level="FATAL" checked>
                <span>FATAL</span>
            </label>
        </div>

        <div class="view-toggle">
            <label class="view-option">
                <input type="radio" name="viewMode" value="stream" checked>
                <span>Stream View</span>
            </label>
            <label class="view-option">
                <input type="radio" name="viewMode" value="params">
                <span>Parameters View</span>
            </label>
        </div>
    </div>

    <div id="param-controls" style="display: none; margin-bottom: 15px;">
        <label class="history-control">
            <span>History size:</span>
            <select id="historySize">
                <option value="1">Latest value only</option>
                <option value="3" selected>Last 3 values</option>
                <option value="5">Last 5 values</option>
                <option value="10">Last 10 values</option>
            </select>
        </label>
        <button id="expandAllBtn" class="btn btn-sm btn-info">Expand All</button>
        <button id="collapseAllBtn" class="btn btn-sm btn-secondary">Collapse All</button>
    </div>

    <div id="realtime-log-container">
        <div id="statusIndicator" class="status-indicator">Connecting to log stream...</div>
        <pre id="logOutput" class="log-content"></pre>
        <div id="paramsOutput" class="params-content" style="display: none;"></div>
    </div>

    <script>
        // Real-time log functionality
        const logOutput = document.getElementById('logOutput');
        const paramsOutput = document.getElementById('paramsOutput');
        const paramControls = document.getElementById('param-controls');
        const clearLogsButton = document.getElementById('clearLogsButton');
        const autoScrollToggle = document.getElementById('autoScrollToggle');
        const statusIndicator = document.getElementById('statusIndicator');
        const levelFilters = document.querySelectorAll('.level-filter');
        const viewModeRadios = document.querySelectorAll('input[name="viewMode"]');
        const historySizeSelect = document.getElementById('historySize');
        const expandAllBtn = document.getElementById('expandAllBtn');
        const collapseAllBtn = document.getElementById('collapseAllBtn');

        // Parameters tracking - using a more complex structure for the tree view
        const parameterTree = new Map(); // Stores the hierarchical structure
        const parameterValues = new Map(); // Stores the actual values with history

        // Maximum number of values to store per parameter
        let maxHistorySize = parseInt(historySizeSelect.value, 10);

        // Apply filters to existing logs
        function applyFilters() {
            console.log("Applying filters...");
            const activeFilters = Array.from(levelFilters)
                .filter(checkbox => checkbox.checked)
                .map(checkbox => checkbox.dataset.level);

            console.log("Active filters:", activeFilters);

            // Apply to all log lines
            document.querySelectorAll('.log-line').forEach(line => {
                let shouldShow = false;

                // Check if this log matches any active filter
                for (const level of activeFilters) {
                    if (line.textContent.includes(level)) {
                        shouldShow = true;
                        break;
                    }
                }

                // Default to showing if no level is detected
                if (!shouldShow && !line.textContent.match(/(INFO|WARNING|ERROR|CRITICAL|FATAL)/)) {
                    shouldShow = true;
                }

                line.style.display = shouldShow ? '' : 'none';
            });
        }

        // Toggle between stream and parameters view
        function toggleView() {
            const viewMode = document.querySelector('input[name="viewMode"]:checked').value;

            if (viewMode === 'stream') {
                logOutput.style.display = '';
                paramsOutput.style.display = 'none';
                paramControls.style.display = 'none';
            } else {
                logOutput.style.display = 'none';
                paramsOutput.style.display = '';
                paramControls.style.display = 'flex';
                renderParameterTree();
            }
        }

        // Extract parameters from log message
        function extractParameters(log) {
            try {
                // Extract the JSON part from the log
                // Format is typically: [timestamp] {json_data}
                const jsonMatch = log.match(/\[(.*?)\]\s*(.*)/);

                if (jsonMatch && jsonMatch[2]) {
                    const timestamp = jsonMatch[1];
                    let jsonStr = jsonMatch[2];

                    // Parse the JSON
                    try {
                        const jsonData = JSON.parse(jsonStr);

                        // Build the parameter tree and store values
                        processJsonObject(jsonData, [], timestamp);
                    } catch (e) {
                        // If JSON parsing fails, try to extract key=value pairs as fallback
                        const paramRegex = /(\w+)=([^,\s]+)/g;
                        let match;

                        while ((match = paramRegex.exec(log)) !== null) {
                            const [, key, value] = match;
                            addParameterValue(key.split('.'), value, timestamp);
                        }
                    }
                }
            } catch (error) {
                console.error("Error extracting parameters:", error);
            }

            // If in parameters view, update the display
            if (document.querySelector('input[name="viewMode"]:checked').value === 'params') {
                renderParameterTree();
            }
        }

        // Process JSON object recursively to build parameter tree
        function processJsonObject(obj, path, timestamp) {
            for (const [key, value] of Object.entries(obj)) {
                const currentPath = [...path, key];

                if (value !== null && typeof value === 'object' && !Array.isArray(value)) {
                    // For objects, just update the tree structure and process recursively
                    ensurePathExists(currentPath);
                    processJsonObject(value, currentPath, timestamp);
                } else {
                    // For leaf values, store the value
                    addParameterValue(currentPath, value, timestamp);
                }
            }
        }

        // Ensure the path exists in the parameter tree
        function ensurePathExists(path) {
            let current = parameterTree;

            for (let i = 0; i < path.length; i++) {
                const segment = path[i];
                if (i === path.length - 1) {
                    // Leaf node
                    if (!current.has(segment)) {
                        current.set(segment, null);
                    }
                } else {
                    // Internal node
                    if (!current.has(segment)) {
                        current.set(segment, new Map());
                    }
                    current = current.get(segment);
                }
            }
        }

        // Add a value to the parameter history
        function addParameterValue(path, value, timestamp) {
            ensurePathExists(path);
            const paramKey = path.join('.');

            // Format the value
            let formattedValue = value;
            if (typeof value === 'string') {
                formattedValue = value;
            } else {
                formattedValue = JSON.stringify(value).replace(/^"|"$/g, '');
            }

            // Create or update the parameter value history
            if (!parameterValues.has(paramKey)) {
                parameterValues.set(paramKey, []);
            }

            const history = parameterValues.get(paramKey);

            // Add new value to the front
            history.unshift({
                value: formattedValue,
                timestamp: timestamp,
                updated: new Date().toISOString()
            });

            // Limit history size
            while (history.length > maxHistorySize) {
                history.pop();
            }
        }

        // Render the parameter tree
        function renderParameterTree() {
            paramsOutput.innerHTML = '';

            // Create the root element
            const rootElement = document.createElement('div');
            rootElement.className = 'tree-root';

            // Render the tree starting from the root
            renderTreeLevel(parameterTree, rootElement, '', 0);

            paramsOutput.appendChild(rootElement);

            // Set up click handlers for expandable items
            paramsOutput.querySelectorAll('.tree-item-expandable').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.classList.contains('tree-toggle') || e.target.classList.contains('tree-item-header')) {
                        const content = this.querySelector('.tree-item-content');
                        if (content) {
                            if (content.style.display === 'none') {
                                content.style.display = 'block';
                                this.classList.add('expanded');
                            } else {
                                content.style.display = 'none';
                                this.classList.remove('expanded');
                            }
                        }
                        e.stopPropagation();
                    }
                });
            });
        }

        // Render a level of the tree
        function renderTreeLevel(nodeMap, parentElement, path, level) {
            // Sort keys alphabetically
            const sortedKeys = Array.from(nodeMap.keys()).sort();

            for (const key of sortedKeys) {
                const childMap = nodeMap.get(key);
                const currentPath = path ? `${path}.${key}` : key;

                // Create item container
                const itemElement = document.createElement('div');
                itemElement.className = 'tree-item';
                if (level === 0) {
                    itemElement.classList.add('tree-item-root');
                }

                // Create item header
                const headerElement = document.createElement('div');
                headerElement.className = 'tree-item-header';

                if (childMap !== null) {
                    // This is a branch node (has children)
                    itemElement.classList.add('tree-item-expandable');

                    // Add toggle button
                    const toggleElement = document.createElement('span');
                    toggleElement.className = 'tree-toggle';
                    toggleElement.textContent = '▶';
                    headerElement.appendChild(toggleElement);

                    // Add label
                    const labelElement = document.createElement('span');
                    labelElement.className = 'tree-label tree-branch';
                    labelElement.textContent = key;
                    headerElement.appendChild(labelElement);

                    // Create content container (initially hidden)
                    const contentElement = document.createElement('div');
                    contentElement.className = 'tree-item-content';
                    contentElement.style.display = 'none';

                    // Recursively render children
                    renderTreeLevel(childMap, contentElement, currentPath, level + 1);

                    // Append header and content to item
                    itemElement.appendChild(headerElement);
                    itemElement.appendChild(contentElement);
                } else {
                    // This is a leaf node (has values)
                    // Add label without toggle
                    const labelElement = document.createElement('span');
                    labelElement.className = 'tree-label tree-leaf';
                    labelElement.textContent = key;
                    headerElement.appendChild(labelElement);

                    // Get value history
                    const history = parameterValues.get(currentPath) || [];

                    // If there are values, show them
                    if (history.length > 0) {
                        // Add the latest value
                        const valueElement = document.createElement('span');
                        valueElement.className = 'tree-value';
                        valueElement.textContent = ': ' + history[0].value;
                        headerElement.appendChild(valueElement);

                        // Add timestamp
                        const timestampElement = document.createElement('span');
                        timestampElement.className = 'tree-timestamp';
                        timestampElement.textContent = history[0].timestamp;
                        headerElement.appendChild(timestampElement);

                        // If we have history, make this expandable
                        if (history.length > 1) {
                            itemElement.classList.add('tree-item-expandable');

                            // Add indicator for history
                            const historyIndicator = document.createElement('span');
                            historyIndicator.className = 'history-indicator';
                            historyIndicator.textContent = ` (${history.length})`;
                            headerElement.appendChild(historyIndicator);

                            // Create content for history
                            const contentElement = document.createElement('div');
                            contentElement.className = 'tree-item-content';
                            contentElement.style.display = 'none';

                            // Add historical values (skip the first one as it's already shown)
                            for (let i = 1; i < history.length; i++) {
                                const historyItem = document.createElement('div');
                                historyItem.className = 'history-item';

                                const historyValue = document.createElement('span');
                                historyValue.className = 'history-value';
                                historyValue.textContent = history[i].value;

                                const historyTimestamp = document.createElement('span');
                                historyTimestamp.className = 'history-timestamp';
                                historyTimestamp.textContent = history[i].timestamp;

                                historyItem.appendChild(historyValue);
                                historyItem.appendChild(historyTimestamp);
                                contentElement.appendChild(historyItem);
                            }

                            itemElement.appendChild(contentElement);
                        }
                    }
                }

                // Add the header to the item
                itemElement.appendChild(headerElement);

                // Add the item to the parent
                parentElement.appendChild(itemElement);
            }
        }

        // Clean up function for tree
        function expandCollapseAll(expand) {
            const items = paramsOutput.querySelectorAll('.tree-item-expandable');
            items.forEach(item => {
                const content = item.querySelector('.tree-item-content');
                if (content) {
                    if (expand) {
                        content.style.display = 'block';
                        item.classList.add('expanded');
                    } else {
                        content.style.display = 'none';
                        item.classList.remove('expanded');
                    }
                }
            });
        }

        // Event listeners for tree controls
        expandAllBtn.addEventListener('click', () => expandCollapseAll(true));
        collapseAllBtn.addEventListener('click', () => expandCollapseAll(false));

        historySizeSelect.addEventListener('change', function() {
            maxHistorySize = parseInt(this.value, 10);

            // Trim all histories to the new size
            for (const [key, history] of parameterValues.entries()) {
                while (history.length > maxHistorySize) {
                    history.pop();
                }
            }

            renderParameterTree();
        });

        clearLogsButton.addEventListener('click', () => {
            logOutput.innerHTML = '';
            // Also clear parameters if in that view
            if (document.querySelector('input[name="viewMode"]:checked').value === 'params') {
                parameterTree.clear();
                parameterValues.clear();
                paramsOutput.innerHTML = '';
            }
        });

        // Add event listeners for filters
        levelFilters.forEach(filter => {
            filter.addEventListener('change', function() {
                console.log(`Filter ${this.dataset.level} changed to ${this.checked}`);
                applyFilters();
            });
        });

        // Add event listener for auto-scroll toggle
        autoScrollToggle.addEventListener('change', function() {
            console.log(`Auto-scroll changed to ${this.checked}`);
            if (this.checked) {
                scrollToBottom();
            }
        });

        // Add event listeners for view mode
        viewModeRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                console.log(`View mode changed to ${this.value}`);
                toggleView();
            });
        });

        // Document ready function
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM fully loaded");

            // Initial filter application
            applyFilters();

            // Set initial view mode
            toggleView();

            // Initial scroll to bottom if auto-scroll is enabled
            if (autoScrollToggle.checked) {
                setTimeout(scrollToBottom, 100);
            }

            // Set up initial observer for the log container
            const resizeObserver = new ResizeObserver(entries => {
                if (autoScrollToggle.checked) {
                    scrollToBottom();
                }
            });

            resizeObserver.observe(logOutput);
            resizeObserver.observe(paramsOutput);
        });

        // Set up SSE connection
        let eventSource = new EventSource('/cloudlog_stream');

        eventSource.addEventListener('open', () => {
            statusIndicator.textContent = 'Connected to log stream';
            statusIndicator.style.color = 'green';
            setTimeout(() => {
                statusIndicator.style.display = 'none';
            }, 3000);
        });

        eventSource.addEventListener('initial', (event) => {
            const logs = JSON.parse(event.data);
            if (logs.length > 0) {
                // Add initial batch of logs
                logs.forEach(log => {
                    appendLog(log);
                    extractParameters(log);
                });
                scrollToBottom();
            }
        });

        eventSource.addEventListener('log', (event) => {
            const logs = JSON.parse(event.data);
            if (logs.length > 0) {
                logs.forEach(log => {
                    appendLog(log);
                    extractParameters(log);
                });

                if (autoScrollToggle.checked) {
                    scrollToBottom();
                }
            }
        });

        eventSource.addEventListener('error', () => {
            statusIndicator.textContent = 'Connection error - attempting to reconnect...';
            statusIndicator.style.color = 'red';
            statusIndicator.style.display = 'block';

            // Try to reconnect after a delay
            setTimeout(() => {
                eventSource.close();
                eventSource = new EventSource('/cloudlog_stream');
            }, 5000);
        });

        function appendLog(log) {
            const logLine = document.createElement('div');
            logLine.className = 'log-line';
            logLine.textContent = log;

            // Color-code based on log level
            if (log.includes('ERROR') || log.includes('CRITICAL') || log.includes('FATAL')) {
                logLine.classList.add('error-log');
            } else if (log.includes('WARNING')) {
                logLine.classList.add('warning-log');
            } else if (log.includes('INFO')) {
                logLine.classList.add('info-log');
            }

            // Apply current filters
            const activeFilters = Array.from(levelFilters)
                .filter(checkbox => checkbox.checked)
                .map(checkbox => checkbox.dataset.level);

            let shouldShow = false;

            // Check if this log matches any active filter
            for (const level of activeFilters) {
                if (log.includes(level)) {
                    shouldShow = true;
                    break;
                }
            }

            // Default to showing if no level is detected
            if (!shouldShow && !log.match(/(INFO|WARNING|ERROR|CRITICAL|FATAL)/)) {
                shouldShow = true;
            }

            logLine.style.display = shouldShow ? '' : 'none';

            logOutput.appendChild(logLine);

            // Limit the number of displayed log lines to prevent browser slowdown
            const maxLines = 1000;
            while (logOutput.childElementCount > maxLines) {
                logOutput.removeChild(logOutput.firstChild);
            }
        }

        function scrollToBottom() {
            // Only scroll if auto-scroll is enabled
            if (autoScrollToggle.checked) {
                // Fix for auto-scrolling - check which view is active
                if (document.querySelector('input[name="viewMode"]:checked').value === 'stream') {
                    logOutput.scrollTop = logOutput.scrollHeight;
                } else {
                    paramsOutput.scrollTop = paramsOutput.scrollHeight;
                }
            }
        }
    </script>

    <style>
        .controls-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        #param-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .history-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .toggle-label {
            margin-left: 5px;
        }

        .filter-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 15px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-weight: bold;
        }

        .filter-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-right: 5px;
        }

        .filter-option span {
            margin-left: 3px;
        }

        .view-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .view-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .view-option span {
            margin-left: 3px;
        }

        #realtime-log-container {
            height: 500px;
            overflow: auto;
            background-color: #f5f5f5;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid #ddd;
            position: relative;
        }

        .log-content {
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            margin-top: 20px;
            min-height: 450px;
            width: 100%;
        }

        .params-content {
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 20px;
            min-height: 450px;
            width: 100%;
        }

        /* Tree View Styles */
        .tree-root {
            margin-left: 0;
        }

        .tree-item {
            margin: 2px 0;
            padding-left: 20px;
        }

        .tree-item-root {
            padding-left: 0;
        }

        .tree-item-header {
            display: flex;
            align-items: center;
            padding: 3px 5px;
            border-radius: 3px;
            cursor: pointer;
        }

        .tree-item-expandable > .tree-item-header:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .tree-toggle {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 5px;
            text-align: center;
            line-height: 16px;
            font-size: 10px;
            color: #666;
            transition: transform 0.2s;
        }

        .tree-item-expandable.expanded > .tree-item-header .tree-toggle {
            transform: rotate(90deg);
        }

        .tree-label {
            font-weight: normal;
            margin-right: 5px;
        }

        .tree-branch {
            font-weight: bold;
            color: #333;
        }

        .tree-leaf {
            color: #0066cc;
        }

        .tree-value {
            color: #333;
            margin-right: 5px;
        }

        .tree-timestamp {
            font-size: 10px;
            color: #666;
            margin-left: auto;
        }

        .tree-item-content {
            padding-left: 20px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 3px 5px;
            margin: 2px 0;
            border-left: 2px solid #ddd;
            color: #666;
        }

        .history-value {
            flex-grow: 1;
            margin-right: 10px;
        }

        .history-timestamp {
            font-size: 10px;
            color: #666;
        }

        .history-indicator {
            font-size: 10px;
            color: #666;
            margin-left: 5px;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
        }

        .btn-info {
            background-color: #17a2b8;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .log-line {
            font-family: monospace;
            font-size: 12px;
            padding: 2px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-log {
            color: #2196F3;
        }

        .error-log {
            color: #d32f2f;
            background-color: #ffebee;
        }

        .warning-log {
            color: #f57c00;
            background-color: #fff8e1;
        }

        .status-indicator {
            padding: 10px;
            margin: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-warning {
            background-color: #f57c00;
            color: white;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .controls-container, #param-controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .filter-container, .view-toggle {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
{% endblock %}

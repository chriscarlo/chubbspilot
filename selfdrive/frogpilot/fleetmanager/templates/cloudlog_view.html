{% extends "layout.html" %}

{% block title %}
    CloudLog - {{ file_name }}
{% endblock %}

{% block main %}
    <br>
    <h1>CloudLog: {{ file_name }}</h1>
    <div class="button-container">
        <a href="/cloudlog" class="back-link">
            <button type="button" class="nav-btn">Back to CloudLogs</button>
        </a>
        <a href="/download_cloudlog/{{ file_name }}" class="download-link">
            <button type="button" class="download-btn">Download Log</button>
        </a>
        <a href="/cloudlog" class="realtime-link">
            <button type="button" class="realtime-btn">View Real-time Stream</button>
        </a>
    </div>
    <br>

    <pre class="log-content">{{ file_content }}</pre>

    <style>
        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .nav-btn, .download-btn, .realtime-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-btn {
            background-color: #607D8B;
            color: white;
        }

        .download-btn {
            background-color: #4CAF50;
            color: white;
        }

        .realtime-btn {
            background-color: #2196F3;
            color: white;
        }

        .nav-btn:hover {
            background-color: #455A64;
        }

        .download-btn:hover {
            background-color: #45a049;
        }

        .realtime-btn:hover {
            background-color: #0b7dda;
        }

        .log-content {
            font-family: monospace;
            font-size: 12px;
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            margin-top: 20px;
        }
    </style>
{% endblock %}

{% block unformated %}
    <!-- This block is intentionally left empty -->
{% endblock %}

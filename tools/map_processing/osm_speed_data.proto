syntax = "proto3";

package openpilot.maps; // Using a namespace consistent with other OP protos

message Point {
  double latitude = 1;
  double longitude = 2;
}

message SpeedLimitSegment {
  int64 osm_way_id = 1;
  repeated Point geometry = 2;
  repeated float curvatures = 3;
  float speed_limit_mps = 4; // Required by reader, default 0.0 set during processing
  repeated float curvature_derived_speeds_mps = 5; // Speeds derived from curvatures using curvature_to_speed
}